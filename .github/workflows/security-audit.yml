name: Security Audit

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit runtime dependencies (fail on high/critical)
        run: npm audit --omit=dev --audit-level=high
